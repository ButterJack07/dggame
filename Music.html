<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI йҹід№җз”ҹжҲҗ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#0f0c1a,#1a1035,#0f0c1a);
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  font-family:'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none
}
.container{
  background:linear-gradient(180deg,#1a0f1e,#0d0812);
  border-radius:16px;padding:20px 25px 20px;
  box-shadow:0 20px 60px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04);
  border:1px solid #2a1a3a;max-width:98vw;width:1100px
}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:0 4px;flex-wrap:wrap;gap:10px}
.header h1{color:#c4b5fd;font-size:22px;font-weight:700;text-shadow:0 2px 8px rgba(139,92,246,.3);letter-spacing:2px}
.header .sub{color:rgba(255,255,255,.15);font-size:12px}
.keyboard-wrapper{
  overflow-x:auto;overflow-y:hidden;padding:8px 0 4px;
  border-radius:8px;position:relative;
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04)
}
.keyboard-wrapper::-webkit-scrollbar{height:4px}
.keyboard-wrapper::-webkit-scrollbar-track{background:rgba(0,0,0,.3);border-radius:2px}
.keyboard-wrapper::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:2px}
#keyboard{
  position:relative;height:200px;margin:0 auto;
  min-width:1260px;background:linear-gradient(180deg,#f8f4f0,#e8e0d8);
  border-radius:0 0 4px 4px
}
.white-key{
  position:absolute;bottom:0;width:58px;height:198px;
  background:linear-gradient(180deg,#fcfcfc,#f0ece8 85%,#e8e0d8);
  border:1px solid #c8c0b8;border-bottom:2px solid #b8b0a8;
  border-radius:0 0 4px 4px;cursor:pointer;
  transition:all .08s ease;z-index:1;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
  padding-bottom:8px
}
.white-key[data-note="C"]{border-left:2px solid #c8c0b8}
.white-key .key-label{font-size:9px;color:#888;font-weight:600;pointer-events:none;transition:color .15s}
.white-key .octave-label{font-size:7px;color:#aaa;pointer-events:none;transition:color .15s;margin-top:1px}
.white-key:hover{background:linear-gradient(180deg,#fff,#f5f0ea 85%,#ece4dc)}
.white-key:active,.white-key.active{
  background:linear-gradient(180deg,#dbeafe,#d0e4f7 85%,#c8dcee);
  height:193px;border-bottom:2px solid #8ab4d8
}
.white-key.selected{
  background:linear-gradient(180deg,#fef3c7,#fde68a 85%,#fcd34d);
  box-shadow:inset 0 0 0 2px #8b5cf6
}
.white-key.selected .key-label{color:#7c3aed;font-weight:700}
.black-key{
  position:absolute;bottom:0;width:38px;height:125px;
  background:linear-gradient(180deg,#3a3a3a,#2a2a2a 40%,#1a1a1a 70%,#222);
  border:1px solid #111;border-bottom:3px solid #0a0a0a;
  border-radius:0 0 3px 3px;cursor:pointer;z-index:2;
  transition:all .08s ease;
  box-shadow:0 3px 6px rgba(0,0,0,.4),inset 0 -1px 0 rgba(255,255,255,.08)
}
.black-key .key-label{font-size:7px;color:#888;font-weight:600;pointer-events:none;transition:color .15s}
.black-key:hover{background:linear-gradient(180deg,#444,#333 40%,#222 70%,#2a2a2a)}
.black-key:active,.black-key.active{
  background:linear-gradient(180deg,#1a3a5c,#0f2a4a 40%,#0a1a3a 70%,#0f2540);
  height:120px;border-bottom:3px solid #0a1a3a
}
.black-key.selected{
  background:linear-gradient(180deg,#8b5cf6,#7c3aed 40%,#6d28d9 70%,#7c3aed);
  box-shadow:0 3px 8px rgba(139,92,246,.4),inset 0 0 0 1px #a78bfa
}
.black-key.selected .key-label{color:#fff;font-weight:700}
.octave-marker{
  position:absolute;top:4px;font-size:9px;font-weight:700;
  color:rgba(0,0,0,.12);pointer-events:none;z-index:1;
  letter-spacing:1px;font-family:'Courier New',monospace
}
.main-panel{
  margin-top:14px;padding:16px;
  background:rgba(255,255,255,.03);border-radius:10px;
  border:1px solid rgba(255,255,255,.05)
}
.selection-area{
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:14px
}
.selection-area .title{color:#c4b5fd;font-size:15px;font-weight:600}
.note-pills{display:flex;gap:6px;align-items:center}
.note-pill{
  display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;
  background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);
  color:#a78bfa;font-size:13px;font-weight:700;font-family:'Courier New',monospace
}
.note-pill.empty{
  background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.08);
  color:rgba(255,255,255,.1);font-size:16px
}
.hint{color:rgba(255,255,255,.15);font-size:12px;margin-bottom:12px}
.config-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:end}
.config-group{flex:1;min-width:200px}
.config-group label{color:rgba(255,255,255,.2);font-size:11px;display:block;margin-bottom:3px;font-weight:500}
.config-group input,.config-group textarea{
  width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.06);
  border-radius:6px;color:#d4c4b0;padding:6px 10px;font-size:12px;font-family:inherit;outline:none;transition:border-color .2s
}
.config-group input:focus,.config-group textarea:focus{border-color:rgba(139,92,246,.4)}
.config-group input::placeholder,.config-group textarea::placeholder{color:rgba(255,255,255,.08)}
.config-group textarea{resize:vertical;min-height:36px}
.token-row{display:flex;gap:6px}
.token-row input{flex:1;font-family:monospace}
.token-row button{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  color:#888;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:10px;white-space:nowrap
}
.token-row button:hover{color:#c4b5fd}
.api-hint{color:rgba(255,255,255,.08);font-size:10px;margin-top:2px}
.api-hint a{color:rgba(139,92,246,.3);text-decoration:none}
.api-hint a:hover{color:rgba(139,92,246,.6)}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.actions button{
  padding:8px 20px;border-radius:6px;border:1px solid rgba(255,255,255,.08);
  cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;
  background:rgba(255,255,255,.05);color:#c4b5fd
}
.actions button:hover{background:rgba(255,255,255,.1);color:#ddd6fe}
.actions button.primary{
  background:linear-gradient(135deg,#7c3aed,#6d28d9);
  border-color:#8b5cf6;color:#fff
}
.actions button.primary:hover{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.actions button.primary:disabled{background:#2a1a4a;border-color:#2a1a4a;color:#555;cursor:not-allowed}
.status{
  padding:8px 12px;border-radius:6px;font-size:12px;min-height:20px;
  background:rgba(0,0,0,.2);color:rgba(255,255,255,.25);
  display:flex;align-items:center;gap:8px;margin-bottom:10px
}
.status.loading{color:#a78bfa;background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.1)}
.status.error{color:#f87171;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.1)}
.status.success{color:#34d399;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.1)}
.spinner{
  display:inline-block;width:14px;height:14px;border:2px solid rgba(139,92,246,.15);
  border-top-color:#8b5cf6;border-radius:50%;animation:spin .8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.player{display:none;margin-top:4px}
.player audio{width:100%;height:36px;border-radius:6px}
@media(max-width:1150px){.container{width:auto}}
@media(max-width:700px){
  .container{padding:12px 10px}
  .header h1{font-size:18px}
  .selection-area .title{font-size:13px}
  .note-pill{width:28px;height:28px;font-size:11px}
  .actions button{font-size:12px;padding:6px 14px}
}
</style>

<body>
<div class="container">
  <div class="header">
    <div>
      <h1>вҷҜ AI йҹід№җз”ҹжҲҗ</h1>
      <div class="sub">йҖүжӢ© 3вҖ“5 дёӘйҹі В· з”ҹжҲҗж°ӣеӣҙйҹід№җ</div>
    </div>
  </div>

  <div class="keyboard-wrapper">
    <div id="keyboard"></div>
  </div>

  <div class="main-panel">
    <div class="selection-area">
      <span class="title">рҹҺ№ е·ІйҖүйҹіз¬Ұ</span>
      <div class="note-pills" id="notePills">
        <span class="note-pill empty">1</span>
        <span class="note-pill empty">2</span>
        <span class="note-pill empty">3</span>
        <span class="note-pill empty">4</span>
        <span class="note-pill empty">5</span>
      </div>
    </div>
    <div class="hint" id="hint">зӮ№еҮ»й’ўзҗҙй”®йҖүжӢ© 3вҖ“5 дёӘйҹіпјҲзӮ№е·ІйҖүеҸ–ж¶Ҳпјү</div>

    <div class="config-row">
      <div class="config-group" style="flex:2">
        <label>рҹҺҜ йЈҺж јжҸҸиҝ°пјҲеҸҜйҖүпјү</label>
        <textarea id="styleInput" rows="1" placeholder="dark ambient / ethereal / space drone / з•ҷз©әеҲҷж №жҚ®жүҖйҖүйҹіиҮӘеҠЁйҖӮй…Қ"></textarea>
      </div>
      <div class="config-group">
        <label>рҹ”‘ Hugging Face TokenпјҲе…Қиҙ№ В· еҸҜйҖүпјү</label>
        <div class="token-row">
          <input type="password" id="hfToken" placeholder="hf_...">
          <button id="toggleToken">жҳҫзӨә</button>
        </div>
        <div class="api-hint">
          <a href="https://huggingface.co/settings/tokens" target="_blank">е…Қиҙ№иҺ·еҸ–</a>
          В· дёҚеЎ«еҲҷдҪҝз”Ёжң¬ең°з®—жі•
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="btnGenerate" disabled>вңЁ з”ҹжҲҗйҹід№җ</button>
      <button id="btnPlay" disabled>в–¶ ж’ӯж”ҫ</button>
      <button id="btnStop" disabled>в–  еҒңжӯў</button>
      <button id="btnDownload" disabled>рҹ’ҫ дёӢиҪҪ WAV</button>
      <button id="btnClear" style="border-color:rgba(248,113,113,.2);color:#f87171">вң• жё…йҷӨ</button>
    </div>

    <div class="status" id="status">йҖүжӢ© 3вҖ“5 дёӘйҹіеҗҺзӮ№еҮ»гҖҢз”ҹжҲҗйҹід№җгҖҚ</div>
    <div class="player" id="player">
      <audio id="audioPlayer" controls style="width:100%"></audio>
    </div>
  </div>
</div>

<script>
(function(){
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WN=['C','D','E','F','G','A','B'];
const BN=['C#','D#','F#','G#','A#'];
const OVS=[3,4,5];
const WKW=60;
const BOP={'C#':41,'D#':101,'F#':221,'G#':281,'A#':341};

function gNL(n){
  if(n.length===1)return n;
  const m={'C#':'CвҷҜ','D#':'DвҷҜ','F#':'FвҷҜ','G#':'GвҷҜ','A#':'AвҷҜ'};
  return m[n]||n;
}

// DOM
const kb=document.getElementById('keyboard');
const pills=document.getElementById('notePills');
const hint=document.getElementById('hint');
const styleInp=document.getElementById('styleInput');
const hfToken=document.getElementById('hfToken');
const toggleBtn=document.getElementById('toggleToken');
const btnGen=document.getElementById('btnGenerate');
const btnPlay=document.getElementById('btnPlay');
const btnStop=document.getElementById('btnStop');
const btnDl=document.getElementById('btnDownload');
const btnClear=document.getElementById('btnClear');
const statusEl=document.getElementById('status');
const playerEl=document.getElementById('player');
const audioEl=document.getElementById('audioPlayer');

// State
let actx=null;
const activeKeys=new Map();
let selected=[]; // {note,octave,midi}
let generatedBlob=null;
let blobUrl=null;
let isPlaying=false;

// Audio context
function ctx(){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
  return actx;
}
function n2m(n,o){return(o+1)*12+NOTES.indexOf(n)}
function m2f(m){return 440*Math.pow(2,(m-69)/12)}

function playNote(k,n,o,v){
  const id=n+o;if(activeKeys.has(id))return;
  const a=ctx();const t=a.currentTime;const f=m2f(n2m(n,o));
  const mg=a.createGain();
  mg.gain.setValueAtTime(0,t);
  mg.gain.linearRampToValueAtTime(v||0.3,t+0.008);
  mg.gain.exponentialRampToValueAtTime((v||0.3)*0.35,t+0.2);
  mg.connect(a.destination);
  const ao=(ty,fm,dt,gv,st)=>{const o=a.createOscillator();o.type=ty;o.frequency.value=f*fm;o.detune.value=dt;const g=a.createGain();g.gain.value=gv;o.connect(g);g.connect(mg);o.start(t);o.stop(t+st);};
  ao('triangle',1,0,1,1.8);ao('sine',1,5,0.25,1.6);ao('sine',2,-2,0.18,1.4);ao('sine',3,0,0.05,1.2);
  activeKeys.set(id,{gain:mg,t0:t});
  if(k)k.classList.add('active');
}
function stopNote(k,n,o){
  const id=n+o;const d=activeKeys.get(id);
  if(!d)return;
  const a=ctx();const t=a.currentTime;
  const el=t-d.t0;const r=Math.max(0.1,Math.min(0.6,0.8-el*0.3));
  d.gain.gain.cancelScheduledValues(t);
  d.gain.gain.setValueAtTime(Math.max(0.001,d.gain.gain.value),t);
  d.gain.gain.exponentialRampToValueAtTime(0.001,t+r);
  activeKeys.delete(id);
  if(k)k.classList.remove('active');
}
function clearActive(){
  const a=actx;
  if(a){const t=a.currentTime;activeKeys.forEach(d=>{d.gain.gain.cancelScheduledValues(t);d.gain.gain.setValueAtTime(Math.max(0.001,d.gain.gain.value),t);d.gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);});}
  kb.querySelectorAll('.active').forEach(el=>el.classList.remove('active'));
  activeKeys.clear();
}

// Keyboard
function buildKB(){
  kb.innerHTML='';
  OVS.forEach((o,oi)=>{
    const off=oi*7*WKW;
    const m=document.createElement('div');
    m.className='octave-marker';m.style.left=(off+4)+'px';m.textContent='Octave '+o;
    kb.appendChild(m);
    WN.forEach((n,wi)=>{
      const k=document.createElement('div');k.className='white-key';
      k.style.left=(off+wi*WKW)+'px';k.dataset.note=n;k.dataset.octave=o;
      const l=document.createElement('span');l.className='key-label';l.textContent=gNL(n);
      k.appendChild(l);
      const ol=document.createElement('span');ol.className='octave-label';ol.textContent=o;
      k.appendChild(ol);kb.appendChild(k);
    });
  });
  OVS.forEach((o,oi)=>{
    const off=oi*7*WKW;
    BN.forEach(n=>{
      const k=document.createElement('div');k.className='black-key';
      k.style.left=(off+BOP[n])+'px';k.dataset.note=n;k.dataset.octave=o;
      const l=document.createElement('span');l.className='key-label';l.textContent=gNL(n);
      k.appendChild(l);kb.appendChild(k);
    });
  });
  evKB();
}

function evKB(){
  kb.querySelectorAll('.white-key,.black-key').forEach(k=>{
    k.addEventListener('mousedown',onKD);
    k.addEventListener('mouseup',onKU);
    k.addEventListener('mouseleave',onKU);
    k.addEventListener('touchstart',e=>{e.preventDefault();onKD(e);},{passive:false});
    k.addEventListener('touchend',e=>{e.preventDefault();onKU(e);},{passive:false});
    k.addEventListener('touchcancel',onKU);
  });
  document.addEventListener('mouseup',()=>clearActive());
}

function onKD(e){
  const k=e.currentTarget;const n=k.dataset.note;const o=parseInt(k.dataset.octave);
  if(!n||isNaN(o))return;
  toggleSel(k,n,o);
}
function onKU(e){
  const k=e.currentTarget;const n=k.dataset.note;const o=parseInt(k.dataset.octave);
  if(n&&!isNaN(o))stopNote(k,n,o);
}

function toggleSel(k,n,o){
  const m=n2m(n,o);const idx=selected.findIndex(s=>s.midi===m);
  if(idx>=0){
    selected.splice(idx,1);k.classList.remove('selected');
    stopNote(k,n,o);
  }else{
    if(selected.length>=5)return;
    selected.push({note:n,octave:o,midi:m});
    playNote(k,n,o);
    k.classList.add('selected');
  }
  updUI();
}

function updUI(){
  kb.querySelectorAll('.selected').forEach(el=>el.classList.remove('selected'));
  selected.forEach(({note,octave})=>{
    const el=kb.querySelector(`[data-note="${note}"][data-octave="${octave}"]`);
    if(el)el.classList.add('selected');
  });
  const pillsEl=pills.querySelectorAll('.note-pill');
  pillsEl.forEach((p,i)=>{
    if(i<selected.length){p.textContent=gNL(selected[i].note);p.className='note-pill';}
    else{p.textContent=i+1;p.className='note-pill empty';}
  });
  const c=selected.length;
  if(c<3)hint.textContent=`иҝҳйңҖ ${3-c} дёӘйҹіпјҲе…ұйңҖ 3-5 дёӘпјүВ· зӮ№еҮ»зҗҙй”®йҖүжӢ© В· зӮ№е·ІйҖүеҸ–ж¶Ҳ`;
  else if(c<5)hint.textContent=`е·ІйҖү ${c} дёӘ вң“  иҝҳеҸҜйҖү ${5-c} дёӘ В· жҲ–зӮ№еҮ»гҖҢз”ҹжҲҗйҹід№җгҖҚ`;
  else hint.textContent='е·ІйҖү 5 дёӘ вң“  зӮ№еҮ»гҖҢз”ҹжҲҗйҹід№җгҖҚејҖе§ӢеҲӣдҪң';
  btnGen.disabled=c<3;
}

// Token
if(localStorage.getItem('hf_token'))hfToken.value=localStorage.getItem('hf_token');
toggleBtn.addEventListener('click',()=>{
  hfToken.type=hfToken.type==='password'?'text':'password';
  toggleBtn.textContent=hfToken.type==='password'?'жҳҫзӨә':'йҡҗи—Ҹ';
});
hfToken.addEventListener('change',()=>localStorage.setItem('hf_token',hfToken.value));

// Status
function setStatus(msg,type){
  statusEl.textContent=msg;
  statusEl.className='status'+(type?' '+type:'');
}

// ==== AI / ALGORITHMIC GENERATION ====

function noteName(midi){return gNL(NOTES[midi%12])+Math.floor(midi/12-1);}

function buildPrompt(selNotes,style){
  const names=selNotes.map(s=>noteName(s.midi)).join(', ');
  const intervals=selNotes.slice(1).map((s,i)=>s.midi-selNotes[i].midi);
  const range=selNotes[selNotes.length-1].midi-selNotes[0].midi;
  const mood=range>12?'wide':'narrow';
  const baseDesc=style.trim()||'ambient atmospheric';

  // determine musical character from note set
  let character='soft evolving';
  if(intervals.some(i=>i===3||i===4))character='melodic flowing';
  if(intervals.some(i=>i===1||i===2))character='gentle moving';
  if(range>12)character='expansive cinematic';

  return `${baseDesc} music inspired by the notes ${names}, ${character} textures, slowly evolving harmonies, ethereal atmosphere, warm resonant tones.`;
}

async function callHF(prompt,token){
  const resp=await fetch('https://api-inference.huggingface.co/models/facebook/musicgen-small',{
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({inputs:prompt,parameters:{max_new_tokens:384,temperature:0.85}})
  });
  if(resp.status===503){
    const wait=Math.ceil((resp.headers.get('x-wait-time')||20));
    setStatus(`вҸі жЁЎеһӢеҠ иҪҪдёӯпјҢзӯүеҫ… ${wait} з§’...`,'loading');
    await new Promise(r=>setTimeout(r,wait*1000));
    return callHF(prompt,token);
  }
  if(!resp.ok){
    const err=await resp.text();
    if(resp.status===401)throw new Error('Token ж— ж•ҲпјҢиҜ·жЈҖжҹҘ Hugging Face Token');
    if(resp.status===429)throw new Error('иҜ·жұӮиҝҮеҝ«пјҢиҜ·зЁҚеҗҺйҮҚиҜ•');
    throw new Error(`API й”ҷиҜҜ (${resp.status})`);
  }
  return resp.blob();
}

function toWav(buf){
  const ch=buf.numberOfChannels||1,sr=buf.sampleRate;
  const frames=buf.length;const dataLen=frames*ch*2;
  const ab=new ArrayBuffer(44+dataLen);const v=new DataView(ab);
  function ws(s,off){for(let i=0;i<s.length;i++)v.setUint8(off+i,s.charCodeAt(i));}
  ws('RIFF',0);v.setUint32(4,36+dataLen,true);ws('WAVE',8);
  ws('fmt ',12);v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,ch,true);v.setUint32(24,sr,true);
  v.setUint32(28,sr*ch*2,true);v.setUint16(32,ch*2,true);v.setUint16(34,16,true);
  ws('data',36);v.setUint32(40,dataLen,true);
  let o=44;
  for(let f=0;f<frames;f++){for(let c=0;c<ch;c++){
    const s=Math.max(-1,Math.min(1,buf.getChannelData(c)[f]));
    v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true);o+=2;
  }}
  return new Blob([ab],{type:'audio/wav'});
}

async function genLocal(selNotes,durSec){
  const mids=selNotes.map(s=>s.midi).sort((a,b)=>a-b);
  const count=mids.length;
  const sr=22050;const len=sr*durSec;
  const off=new OfflineAudioContext(2,len,sr);

  const freqs=mids.map(m=>m2f(m));
  const beat=0.35;

  // master + reverb bus
  const master=off.createGain();master.gain.value=0.45;master.connect(off.destination);
  const revSend=off.createGain();revSend.gain.value=0.25;
  const revOut=off.createGain();revOut.gain.value=0.3;revOut.connect(master);
  [0.03,0.07,0.12,0.18,0.25,0.33].forEach(dt=>{
    const d=off.createDelay(0.5);d.delayTime.value=dt;
    const fb=off.createGain();fb.gain.value=0.15+Math.random()*0.1;
    const mx=off.createGain();mx.gain.value=0.4/6;
    revSend.connect(d);d.connect(fb);fb.connect(d);d.connect(mx);mx.connect(revOut);
  });

  function melNote(freq,st,dur,vol,type){
    const osc=off.createOscillator();osc.type=type||'sine';osc.frequency.value=freq;
    const g=off.createGain();
    const atk=0.006;const dec=Math.min(0.03,dur*0.15);
    g.gain.setValueAtTime(0,st);
    g.gain.linearRampToValueAtTime(vol,st+atk);
    g.gain.exponentialRampToValueAtTime(vol*0.3,st+atk+dec);
    if(dur-atk-dec-0.05>0.01)g.gain.setValueAtTime(vol*0.3,st+dur-0.05);
    g.gain.exponentialRampToValueAtTime(0.001,st+dur);
    osc.connect(g);g.connect(master);g.connect(revSend);
    osc.start(st);osc.stop(st+dur+0.1);
  }

  function chordNotes(freqs,st,dur,vol){
    freqs.forEach((f,i)=>{
      const osc=off.createOscillator();osc.type='sine';osc.frequency.value=f;
      osc.detune.value=(i-freqs.length/2)*0.3;
      const g=off.createGain();
      g.gain.setValueAtTime(0,st);
      g.gain.linearRampToValueAtTime(vol,st+0.15);
      g.gain.setValueAtTime(vol,st+dur-0.3);
      g.gain.exponentialRampToValueAtTime(0.001,st+dur);
      osc.connect(g);g.connect(master);g.connect(revSend);
      osc.start(st);osc.stop(st+dur+0.1);
    });
  }

  // layer 1: melodic arpeggio вҖ” the main voice
  const patterns=[
    [0,1,2,3,4,3,2,1],
    [0,2,4,3,1],
    [4,3,2,1,0,1,2,3],
    [0,1,2,3,4,4,3,2,1,0],
    [0,4,1,3,2],
  ];
  let t=0.4;let pat=0;let step=0;
  while(t<durSec-0.8){
    const p=patterns[pat%patterns.length];
    const idx=p[step%p.length]%count;
    const ntLen=beat*(step%4===3?1.8:0.7+Math.random()*0.5);
    const vel=0.14+Math.random()*0.13;
    const oscType=idx%2===0?'triangle':'sine';
    melNote(freqs[idx],t,ntLen,vel,oscType);
    // occasionally add a harmony note
    if(step%3===0&&count>2){
      const hIdx=(idx+2)%count;
      melNote(freqs[hIdx],t+0.02,ntLen*0.7,vel*0.35,oscType);
    }
    const gap=ntLen*(step%5===4?0.9:0.55)+Math.random()*0.04;
    t+=gap;step++;
    if(step%p.length===0){pat++;t+=beat*0.4;}
  }

  // layer 2: gentle chord pad вҖ” subtle, moves every few seconds
  const padVol=0.035;
  let pt=1;
  while(pt<durSec-3){
    const subset=[];
    for(let i=0;i<Math.min(3,count);i++){
      subset.push(freqs[(pt*7+i*3)%count]);
    }
    chordNotes(subset,pt,3+Math.random()*2,padVol);
    pt+=2.5+Math.random()*1.5;
  }

  // layer 3: occasional bell-like accents
  if(count>=2){
    const hiF=m2f(mids[count-1])*2;
    const ac=3+Math.floor(Math.random()*3);
    for(let i=0;i<ac;i++){
      const at=0.8+Math.random()*(durSec-2.5);
      const osc=off.createOscillator();osc.type='sine';
      osc.frequency.value=hiF*(0.5+Math.random()*0.5);
      const g=off.createGain();
      g.gain.setValueAtTime(0,at);
      g.gain.linearRampToValueAtTime(0.035+Math.random()*0.02,at+0.004);
      g.gain.exponentialRampToValueAtTime(0.001,at+0.5+Math.random()*0.4);
      osc.connect(g);g.connect(master);g.connect(revSend);
      osc.start(at);osc.stop(at+1);
    }
  }

  const buf=await off.startRendering();
  return buf;
}

btnGen.addEventListener('click',async()=>{
  if(selected.length<3)return;
  btnGen.disabled=true;
  if(blobUrl){URL.revokeObjectURL(blobUrl);blobUrl=null;}
  audioEl.pause();audioEl.src='';
  playerEl.style.display='none';generatedBlob=null;
  btnPlay.disabled=true;btnDl.disabled=true;isPlaying=false;btnPlay.textContent='в–¶ ж’ӯж”ҫ';

  const token=hfToken.value.trim();
  const style=styleInp.value.trim();
  const prompt=buildPrompt(selected,style);

  try{
    if(token){
      setStatus('рҹӨ– AI з”ҹжҲҗдёӯпјҲзәҰ 10-30 з§’пјү...','loading');
      const blob=await callHF(prompt,token);
      generatedBlob=blob;
      setStatus(`вң… AI з”ҹжҲҗе®ҢжҲҗ (${(blob.size/1024).toFixed(0)} KB)`,'success');
    }else{
      setStatus('рҹҺӣпёҸ жң¬ең°з®—жі•з”ҹжҲҗдёӯпјҲзәҰ 5-15 з§’пјү...','loading');
      const dur=prompt.includes('long')?40:25;
      const buf=await genLocal(selected,dur);
      generatedBlob=toWav(buf);
      setStatus(`вң… жң¬ең°з”ҹжҲҗе®ҢжҲҗ (${(generatedBlob.size/1024).toFixed(0)} KB)`,'success');
    }
    blobUrl=URL.createObjectURL(generatedBlob);
    audioEl.src=blobUrl;
    playerEl.style.display='block';
    btnPlay.disabled=false;btnDl.disabled=false;
  }catch(e){
    setStatus('вқҢ '+e.message,'error');
  }
  btnGen.disabled=false;
});

btnPlay.addEventListener('click',()=>{
  if(!generatedBlob)return;
  if(isPlaying){audioEl.pause();isPlaying=false;btnPlay.textContent='в–¶ ж’ӯж”ҫ';return;}
  audioEl.play();isPlaying=true;btnPlay.textContent='вҸё жҡӮеҒң';
  audioEl.onended=()=>{isPlaying=false;btnPlay.textContent='в–¶ ж’ӯж”ҫ';};
});
btnStop.addEventListener('click',()=>{
  audioEl.pause();audioEl.currentTime=0;isPlaying=false;btnPlay.textContent='в–¶ ж’ӯж”ҫ';
});
btnDl.addEventListener('click',()=>{
  if(!generatedBlob)return;
  const names=selected.map(s=>gNL(s.note)).join('-');
  const a=document.createElement('a');a.href=URL.createObjectURL(generatedBlob);
  a.download=`ai_music_${names}.wav`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
});
btnClear.addEventListener('click',()=>{
  selected=[];kb.querySelectorAll('.selected').forEach(el=>el.classList.remove('selected'));
  clearActive();updUI();generatedBlob=null;
  if(blobUrl){URL.revokeObjectURL(blobUrl);blobUrl=null;}
  audioEl.pause();audioEl.src='';playerEl.style.display='none';
  btnPlay.disabled=true;btnDl.disabled=true;isPlaying=false;btnPlay.textContent='в–¶ ж’ӯж”ҫ';
  btnGen.disabled=true;setStatus('е·Іжё…йҷӨпјҢйҮҚж–°йҖүжӢ© 3вҖ“5 дёӘйҹі','');
});

// Init
buildKB();updUI();

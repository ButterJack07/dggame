<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帝国时代视角 21×21 地图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  #info {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    color: #f0d9a0; font-size: 14px; z-index: 10;
    background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 6px;
    border: 1px solid rgba(240,217,160,0.2);
    pointer-events: none; user-select: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    white-space: nowrap;
  }
  #info kbd {
    background: rgba(240,217,160,0.15); padding: 1px 6px; border-radius: 3px;
    border: 1px solid rgba(240,217,160,0.3); font-size: 12px;
  }
  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<div id="info">
  🏰 帝国时代视角 21×21 —
  拖拽移动 · 滚轮缩放 · 点击选中 · R重置 · ←→↑↓微移
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ====== 常量 ======
const TILE_W = 64;
const TILE_H = 32;
const HEIGHT_SCALE = 24;
const MAP_N = 21;

// ====== 相机 ======
const cam = { x: 0, y: 0, zoom: 1 };
const MIN_ZOOM = 0.2;
const MAX_ZOOM = 3.0;

// ====== 交互状态 ======
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let camStartX = 0, camStartY = 0;
let selectedTile = null;

// ====== 地形类型 ======
const terrainTypes = [
  { name: '草地',  color: '#4a8c3f', dark: '#2d6b28', light: '#6abf5a' },
  { name: '森林',  color: '#2d5a1e', dark: '#1a3d10', light: '#4a8c32' },
  { name: '水域',  color: '#3a7bd5', dark: '#1f4f8a', light: '#5a9eff' },
  { name: '山地',  color: '#8a7a5a', dark: '#5c4f36', light: '#b8a880' },
  { name: '沙滩',  color: '#d4b86a', dark: '#a08a40', light: '#f0da90' },
  { name: '雪地',  color: '#d8e0e8', dark: '#a0b0c0', light: '#ffffff' },
];

// ====== 地图生成 ======
function smoothNoise(r, c, scale) {
  const v = Math.sin(r / scale * 12.9898 + c / scale * 78.233) * 43758.5453;
  return v - Math.floor(v);
}

function fbm(r, c) {
  let val = 0, amp = 1, freq = 1, total = 0;
  for (let i = 0; i < 4; i++) {
    val += amp * smoothNoise(r * freq, c * freq, 6);
    total += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return val / total;
}

function createMap() {
  const m = [];

  // 超低频率水域遮罩 → 大片连水
  // 正常频率地形高度 → 陆地起伏
  for (let r = 0; r < MAP_N; r++) {
    m[r] = [];
    for (let c = 0; c < MAP_N; c++) {
      const waterMask = fbm(r * 0.25 + 200, c * 0.25 + 200);
      const isWater = waterMask < 0.35;

      if (isWater) {
        m[r][c] = { terrain: terrainTypes[2], height: 0, object: null };
      } else {
        const n = fbm(r * 0.65 + 100, c * 0.65 + 100);
        let h = Math.floor(n * 5);
        let ti;

        if (n < 0.45) {
          ti = 0; if (h > 2) h = 2;
        } else if (n < 0.68) {
          ti = 1; if (h < 1) h = 1; if (h > 3) h = 3;
        } else if (n < 0.88) {
          ti = 3; if (h < 2) h = 2;
        } else {
          ti = 5; if (h < 3) h = 3; if (h > 5) h = 5;
        }

        m[r][c] = { terrain: terrainTypes[ti], height: h, object: null };
      }
    }
  }

  // 水陆交界刷沙滩
  for (let r = 0; r < MAP_N; r++) {
    for (let c = 0; c < MAP_N; c++) {
      if (m[r][c].terrain === terrainTypes[2]) continue;
      for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < MAP_N && nc >= 0 && nc < MAP_N && m[nr][nc].terrain === terrainTypes[2]) {
          m[r][c].terrain = terrainTypes[4];
          if (m[r][c].height > 1) m[r][c].height = 1;
          break;
        }
      }
    }
  }

  const ct = Math.floor(MAP_N / 2);
  m[ct][ct].object = { type: 'town-center', name: '城镇中心' };
  return m;
}

const map = createMap();

// ====== 颜色工具 ======
function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3), 16), g: parseInt(hex.slice(3,5), 16), b: parseInt(hex.slice(5,7), 16) };
}

// ====== 光照计算（基于法线） ======
function calcLight(p1, p2, p3) {
  const ux = p2.x - p1.x, uy = p2.y - p1.y, uz = p2.z - p1.z;
  const vx = p3.x - p1.x, vy = p3.y - p1.y, vz = p3.z - p1.z;
  const nx = uy * vz - uz * vy;
  const ny = uz * vx - ux * vz;
  const nz = ux * vy - uy * vx;
  const len = Math.sqrt(nx * nx + ny * ny + nz * nz);
  if (len < 0.001) return 1;
  const lx = 0.3, ly = -0.7, lz = 0.6;
  const dot = (nx * lx + ny * ly + nz * lz) / len;
  return 0.5 + 0.5 * Math.max(0, dot);
}

function shadeColor(r, g, b, factor) {
  return `rgb(${Math.min(255, Math.max(0, r * factor))|0},${Math.min(255, Math.max(0, g * factor))|0},${Math.min(255, Math.max(0, b * factor))|0})`;
}

// ====== 顶点高度插值（滑坡/倒角用） ======
function getVtxHeight(r, c, v) {
  const nei = {
    top:    [[-1,-1],[-1,0],[0,-1],[0,0]],
    right:  [[-1,0],[-1,1],[0,0],[0,1]],
    bottom: [[0,0],[0,1],[1,0],[1,1]],
    left:   [[0,-1],[0,0],[1,-1],[1,0]],
  };
  let sum = 0, cnt = 0;
  for (const [dr, dc] of nei[v]) {
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < MAP_N && nc >= 0 && nc < MAP_N) {
      sum += map[nr][nc].height;
      cnt++;
    }
  }
  return cnt ? sum / cnt : 0;
}

// ====== 获取 tile 的 5 个顶点（4个边缘顶点取平均高度 → 自然倒角）=====
function getTileVerts(r, c) {
  const tw = TILE_W / 2, th = TILE_H / 2;
  const h = map[r][c].height * HEIGHT_SCALE;
  const ht = getVtxHeight(r, c, 'top') * HEIGHT_SCALE;
  const hr = getVtxHeight(r, c, 'right') * HEIGHT_SCALE;
  const hb = getVtxHeight(r, c, 'bottom') * HEIGHT_SCALE;
  const hl = getVtxHeight(r, c, 'left') * HEIGHT_SCALE;
  return {
    vt: { x: (c - r)     * tw, y: (c + r - 1) * th - ht, z: ht },
    vr: { x: (c - r + 1) * tw, y: (c + r)     * th - hr, z: hr },
    vb: { x: (c - r)     * tw, y: (c + r + 1) * th - hb, z: hb },
    vl: { x: (c - r - 1) * tw, y: (c + r)     * th - hl, z: hl },
    vc: { x: (c - r)     * tw, y: (c + r)     * th - h,  z: h  },
  };
}

// ====== 绘制单个方格（中间平顶 + 边缘倒角） ======
function drawTile(r, c, cell) {
  const tw = TILE_W / 2, th = TILE_H / 2;
  const baseC = hexToRgb(cell.terrain.color);
  const B = 0.08; // 倒角宽度（占边长比例）

  const v = getTileVerts(r, c);
  const { vt, vr, vb, vl, vc } = v;

  const h = cell.height * HEIGHT_SCALE;
  const fi = 1 - B;
  function lerpV(a, b, t) {
    return {
      x: a.x + (b.x - a.x) * t,
      y: a.y + (b.y - a.y) * t,
      z: h,
    };
  }
  const it = lerpV(vc, vt, fi);
  const ir = lerpV(vc, vr, fi);
  const ib = lerpV(vc, vb, fi);
  const il = lerpV(vc, vl, fi);

  // --- 中间平顶（2个三角形）---
  const innerTris = [[it,ir,ib],[it,ib,il]];
  for (const [p1, p2, p3] of innerTris) {
    const lt = calcLight(p1, p2, p3);
    ctx.fillStyle = shadeColor(baseC.r, baseC.g, baseC.b, lt);
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.lineTo(p3.x,p3.y); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.03)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // --- 4条倒角带（每条2个三角形）---
  const bevelDark = 0.90;
  const bevels = [
    [vt, vr, ir, it],
    [vr, vb, ib, ir],
    [vb, vl, il, ib],
    [vl, vt, it, il],
  ];
  for (const [o1, o2, i2, i1] of bevels) {
    const lt1 = calcLight(o1, o2, i2);
    const lt2 = calcLight(o1, i2, i1);
    ctx.fillStyle = shadeColor(baseC.r * bevelDark, baseC.g * bevelDark, baseC.b * bevelDark, lt1);
    ctx.beginPath(); ctx.moveTo(o1.x,o1.y); ctx.lineTo(o2.x,o2.y); ctx.lineTo(i2.x,i2.y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = shadeColor(baseC.r * bevelDark, baseC.g * bevelDark, baseC.b * bevelDark, lt2);
    ctx.beginPath(); ctx.moveTo(o1.x,o1.y); ctx.lineTo(i2.x,i2.y); ctx.lineTo(i1.x,i1.y); ctx.closePath(); ctx.fill();
  }

  // --- 选中高亮 ---
  if (selectedTile && selectedTile.r === r && selectedTile.c === c) {
    ctx.beginPath();
    ctx.moveTo(vt.x, vt.y);
    ctx.lineTo(vr.x, vr.y);
    ctx.lineTo(vb.x, vb.y);
    ctx.lineTo(vl.x, vl.y);
    ctx.closePath();
    ctx.strokeStyle = '#ffe066';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffe066';
    ctx.shadowBlur = 12;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // --- 装饰 ---
  const cx = (c - r) * tw;
  const cy = (c + r) * th - cell.height * HEIGHT_SCALE;

  if (cell.object) {
    drawObject(cx, cy - th * 0.4, cell.object);
  }

  // 树木
  const seed = Math.sin(r * 127.1 + c * 311.7) * 43758.5453;
  const sVal = seed - Math.floor(seed);
  if (cell.terrain.name === '森林' && !cell.object && sVal > 0.3) {
    const ox = (sVal - 0.5) * 14;
    const oy = (Math.sin(r * 73.1 + c * 199.3) * 43758.5453 - Math.floor(Math.sin(r * 73.1 + c * 199.3) * 43758.5453)) * 10 - 5;
    const sz = 4 + sVal * 8;
    ctx.beginPath();
    ctx.arc(cx + ox, cy + oy, sz, 0, Math.PI * 2);
    ctx.fillStyle = '#1a4a10';
    ctx.fill();
    ctx.strokeStyle = '#0d2a08';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // 水波纹
  if (cell.terrain.name === '水') {
    const wave = Math.sin(r * 2.5 + c * 3.7 + Date.now() * 0.001) * 0.15 + 0.5;
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${wave * 0.12})`;
    ctx.fill();
  }
}

// ====== 绘制建筑 ======
function drawObject(x, y, obj) {
  if (obj.type === 'town-center') {
    const bw = 44, bh = 32;
    const baseY = y;

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(x + 4, baseY + 4, bw/2 + 2, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#8B5E3C';
    ctx.strokeStyle = '#5a3a1e';
    ctx.lineWidth = 1.5;
    ctx.fillRect(x - bw/2, baseY - bh, bw, bh);
    ctx.strokeRect(x - bw/2, baseY - bh, bw, bh);

    ctx.beginPath();
    ctx.moveTo(x + bw/2, baseY - bh);
    ctx.lineTo(x + bw/2 + 10, baseY - bh + 5);
    ctx.lineTo(x + bw/2 + 10, baseY + 5);
    ctx.lineTo(x + bw/2, baseY);
    ctx.closePath();
    ctx.fillStyle = '#6d4226';
    ctx.fill();
    ctx.strokeStyle = '#5a3a1e';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x - bw/2 - 10, baseY - bh);
    ctx.lineTo(x, baseY - bh - 24);
    ctx.lineTo(x + bw/2 + 20, baseY - bh + 5);
    ctx.lineTo(x + bw/2 + 10, baseY - bh + 5);
    ctx.closePath();
    ctx.fillStyle = '#6d3f1a';
    ctx.fill();
    ctx.strokeStyle = '#4a2a0e';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = '#7a4a24';
    ctx.fillRect(x + 6, baseY - bh - 26, 8, 10);
    ctx.strokeStyle = '#4a2a0e';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 6, baseY - bh - 26, 8, 10);

    ctx.fillStyle = '#3a1e08';
    ctx.fillRect(x - 6, baseY - 14, 12, 14);
    ctx.beginPath();
    ctx.arc(x, baseY - 14, 6, Math.PI, 0);
    ctx.fill();

    ctx.fillStyle = '#c8a87a';
    ctx.fillRect(x - bw/2 + 5, baseY - bh + 6, 8, 8);
    ctx.strokeStyle = '#5a3a1e';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x - bw/2 + 5, baseY - bh + 6, 8, 8);
    ctx.fillRect(x + bw/2 - 13, baseY - bh + 6, 8, 8);
    ctx.strokeRect(x + bw/2 - 13, baseY - bh + 6, 8, 8);

    const flagX = x + 16;
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(flagX, baseY - bh - 32, 2, 30);
    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    ctx.moveTo(flagX + 2, baseY - bh - 32);
    ctx.lineTo(flagX + 16, baseY - bh - 26);
    ctx.lineTo(flagX + 2, baseY - bh - 20);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#f0d9a0';
    ctx.font = 'bold 11px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    ctx.fillText(obj.name, x, baseY - bh - 34);
    ctx.shadowBlur = 0;
  }
}

// ====== 点击检测（平顶 + 倒角） ======
function getTileFromScreen(mx, my) {
  const wx = (mx - W/2) / cam.zoom + W/2;
  const wy = (my - H/2) / cam.zoom + H/2;

  const tw = TILE_W / 2, th = TILE_H / 2;
  const c_plus_r = wy / th;
  const c_minus_r = wx / tw;
  const fc = (c_plus_r + c_minus_r) / 2;
  const fr = (c_plus_r - c_minus_r) / 2;
  const guessR = Math.round(fr);
  const guessC = Math.round(fc);

  function ptInTri(px, py, a, b, c) {
    const d1 = (px - b.x) * (a.y - b.y) - (a.x - b.x) * (py - b.y);
    const d2 = (px - c.x) * (b.y - c.y) - (b.x - c.x) * (py - c.y);
    const d3 = (px - a.x) * (c.y - a.y) - (c.x - a.x) * (py - a.y);
    const neg = (d1 < 0) || (d2 < 0) || (d3 < 0);
    const pos = (d1 > 0) || (d2 > 0) || (d3 > 0);
    return !(neg && pos);
  }

  const B = 0.08;
  const fi = 1 - B;

  let best = null;
  let bestDist = Infinity;

  for (let dr = -3; dr <= 3; dr++) {
    for (let dc = -3; dc <= 3; dc++) {
      const rr = guessR + dr;
      const cc = guessC + dc;
      if (rr < 0 || rr >= MAP_N || cc < 0 || cc >= MAP_N) continue;

      const { vt, vr, vb, vl, vc } = getTileVerts(rr, cc);
      const h = map[rr][cc].height * HEIGHT_SCALE;
      function lerpV(a, b, t) {
        return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
      }
      const it = lerpV(vc, vt, fi);
      const ir = lerpV(vc, vr, fi);
      const ib = lerpV(vc, vb, fi);
      const il = lerpV(vc, vl, fi);

      const tris = [
        [it,ir,ib],[it,ib,il],
        [vt,vr,ir],[vt,ir,it],
        [vr,vb,ib],[vr,ib,ir],
        [vb,vl,il],[vb,il,ib],
        [vl,vt,it],[vl,it,il],
      ];
      for (const [p1, p2, p3] of tris) {
        if (ptInTri(wx, wy, p1, p2, p3)) {
          const cx = (p1.x + p2.x + p3.x) / 3;
          const cy = (p1.y + p2.y + p3.y) / 3;
          const dist = Math.hypot(wx - cx, wy - cy);
          if (dist < bestDist) {
            bestDist = dist;
            best = { r: rr, c: cc };
          }
        }
      }
    }
  }
  return best;
}

// ====== 主渲染 ======
function render() {
  ctx.clearRect(0, 0, W, H);

  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#1a1a2e');
  skyGrad.addColorStop(0.6, '#2d1b3d');
  skyGrad.addColorStop(1, '#3d2b1a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.save();

  const zoom = cam.zoom;
  ctx.translate(W/2, H/2);
  ctx.scale(zoom, zoom);
  ctx.translate(-W/2, -H/2);
  ctx.translate(cam.x, cam.y);

  const tiles = [];
  for (let r = 0; r < MAP_N; r++) {
    for (let c = 0; c < MAP_N; c++) {
      tiles.push({ r, c, cell: map[r][c] });
    }
  }
  tiles.sort((a, b) => (a.r + a.c) - (b.r + b.c));

  for (const t of tiles) {
    drawTile(t.r, t.c, t.cell);
  }

  ctx.restore();

  if (selectedTile) {
    const cell = map[selectedTile.r][selectedTile.c];
    const objName = cell.object ? ` · ${cell.object.name}` : '';
    const sx = 20, sy = H - 50;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.roundRect(sx - 10, sy - 14, 380, 44, 8);
    ctx.fill();

    ctx.fillStyle = '#f0d9a0';
    ctx.font = '15px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(
      `📍 [${selectedTile.r},${selectedTile.c}] ${cell.terrain.name} 高度:${cell.height}${objName}`,
      sx, sy + 8
    );
  }

  requestAnimationFrame(render);
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    return this;
  };
}

// ====== 鼠标事件 ======
canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  camStartX = cam.x;
  camStartY = cam.y;
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  cam.x = camStartX + (e.clientX - dragStartX) / cam.zoom;
  cam.y = camStartY + (e.clientY - dragStartY) / cam.zoom;
});

window.addEventListener('mouseup', (e) => {
  if (!isDragging) return;
  isDragging = false;

  const dx = Math.abs(e.clientX - dragStartX);
  const dy = Math.abs(e.clientY - dragStartY);
  if (dx < 5 && dy < 5) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left);
    const my = (e.clientY - rect.top);
    const hit = getTileFromScreen(mx, my);
    selectedTile = hit;
  }
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  cam.zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, cam.zoom * delta));
}, { passive: false });

// ====== 触摸 ======
let touchStartDist = 0;
let lastTouchZoom = 1;

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    camStartX = cam.x;
    camStartY = cam.y;
  } else if (e.touches.length === 2) {
    const t = e.touches;
    touchStartDist = Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
    lastTouchZoom = cam.zoom;
  }
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && isDragging) {
    cam.x = camStartX + (e.touches[0].clientX - dragStartX) / cam.zoom;
    cam.y = camStartY + (e.touches[0].clientY - dragStartY) / cam.zoom;
  } else if (e.touches.length === 2) {
    const t = e.touches;
    const dist = Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
    const scale = dist / touchStartDist;
    cam.zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, lastTouchZoom * scale));
  }
}, { passive: true });

canvas.addEventListener('touchend', () => {
  isDragging = false;
}, { passive: true });

// ====== 键盘 ======
window.addEventListener('keydown', (e) => {
  const step = 20 / cam.zoom;
  switch (e.key) {
    case 'ArrowUp':    cam.y -= step; break;
    case 'ArrowDown':  cam.y += step; break;
    case 'ArrowLeft':  cam.x -= step; break;
    case 'ArrowRight': cam.x += step; break;
    case 'r': case 'R':
      for (let r = 0; r < MAP_N; r++) {
        for (let c = 0; c < MAP_N; c++) {
          const cell = map[r][c];
          const waterMask = fbm(r * 0.25 + 200, c * 0.25 + 200);
          if (waterMask < 0.35) {
            cell.terrain = terrainTypes[2];
            cell.height = 0;
            cell.object = null;
          } else {
            const n = fbm(r * 0.65 + 100, c * 0.65 + 100);
            let h = Math.floor(n * 5);
            let ti;
            if (n < 0.45) {
              ti = 0; if (h > 2) h = 2;
            } else if (n < 0.68) {
              ti = 1; if (h < 1) h = 1; if (h > 3) h = 3;
            } else if (n < 0.88) {
              ti = 3; if (h < 2) h = 2;
            } else {
              ti = 5; if (h < 3) h = 3; if (h > 5) h = 5;
            }
            cell.terrain = terrainTypes[ti];
            cell.height = h;
            cell.object = null;
          }
        }
      }
      for (let r = 0; r < MAP_N; r++) {
        for (let c = 0; c < MAP_N; c++) {
          if (map[r][c].terrain === terrainTypes[2]) continue;
          for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < MAP_N && nc >= 0 && nc < MAP_N && map[nr][nc].terrain === terrainTypes[2]) {
              map[r][c].terrain = terrainTypes[4];
              if (map[r][c].height > 1) map[r][c].height = 1;
              break;
            }
          }
        }
      }
      const ct = Math.floor(MAP_N / 2);
      map[ct][ct].object = { type: 'town-center', name: '城镇中心' };
      selectedTile = null;
      break;
  }
});

// ====== 开始 ======
render();
</script>
</body>
</html>
